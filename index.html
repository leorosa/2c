<!DOCTYPE html>
<html lang='pt'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='description' content='2C: A minimal financial calculator.'>
    <title>Essencial HP 12c</title>
    <link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
    <style>
        #display {
            position: relative;
            left: -620px;
            top: -413px;
            background: #0000;
            text-align: right;
            font-size: 36pt;
            font-weight: bold;
/*          font-style: italic; */
            letter-spacing: 8px;
            border: none;
            outline: none;
            font-family: 'Seven Segment';
            width: 300px;
        }
        button {
            background: #0000;
            color: #0000;
            border: none;
            position: relative;
            top: -330px;
            width: 50px;
            height: 45px;
        }
        #n { left: 55px; }
        #i { left: 73px; }
        #PV { left: 91px; }
        #PMT { left: 109px; }
        #FV { left: 127px; }
        #CHS { left: 145px; }
        #clear {
            top: -240px;
            left: 340px;
        }
    </style>
</head>
<body>
    <img src='hp12c_platinum.jpg'>
    <input type='number' step='any' id='display'></input><br>
    <div id='buttons'>
        <button id='n' onclick='setN()'>n</button>
        <button id='i' onclick='setI()'>i</button>
        <button id='PV' onclick='setPV()'>PV</button>
        <button id='PMT' onclick='setPMT()'>PMT</button>
        <button id='FV' onclick='setFV()'>FV</button>
        <button id='CHS' onclick='CHS()'>CHS</button>
    </div>
    <br><button id='clear' onclick='clearVals()'>clear</button>
    <script>
        var newVal = false
        var n = 0
        var i = 0
        var PV = 0
        var PMT = 0
        var FV = 0
        document.getElementById('display').value = '0'
        document.getElementById('display').onclick = function () {
            document.getElementById('display').value = ''
            newVal = true
        }
        function clearVals() {
            newVal = false
            n = 0
            i = 0
            PV = 0
            PMT = 0
            FV = 0
            document.getElementById('n').title = 0
            document.getElementById('i').title = 0
            document.getElementById('PV').title = 0
            document.getElementById('PMT').title = 0
            document.getElementById('FV').title = 0
            document.getElementById('display').value = '0'
            document.getElementById('n').style.background = '#0000'
            document.getElementById('i').style.background = '#0000'
            document.getElementById('PV').style.background = '#0000'
            document.getElementById('PMT').style.background = '#0000'
            document.getElementById('FV').style.background = '#0000'
            document.getElementById('display').style.background = '#0000'
        }
        function setN() {
            if (newVal) {
                n = Number(document.getElementById('display').value)
                newVal = false
            } else {
// n = log( (PMT+i*FV)/(PMT-PV) ) / log(1+i)
                n = Math.log( (PMT+i*FV)/(PMT-PV) ) / Math.log(1+i)
                console.log(n)
            }
            document.getElementById('display').value = n.toFixed(2)
            document.getElementById('n').title = n
            document.getElementById('n').style.background = '#0005'
        }
        function setI() {
            if (newVal) {
                i = Number(document.getElementById('display').value)/100
                newVal = false
            } else {
// Linear Iteractive Method: -> does not converge
//  i = (PMT * ((1+i)^n-1)) / (FV - PV * (1+i)^n)
// Regula Falsi Method (better than bisect)
                var i1 = 0.000001
                var i2 = 10
                i = (i1+i2)/2
                res1 = FV + PV*Math.pow(1+i1,n) + PMT*(Math.pow(1+i1,n)-1)/i1
                res2 = FV + PV*Math.pow(1+i2,n) + PMT*(Math.pow(1+i2,n)-1)/i2
                while (Math.abs(i1-i2)>0.001) {
                    res = FV + PV*Math.pow(1+i,n) + PMT*(Math.pow(1+i,n)-1)/i
                    i = (i1*res2-i2*res1)/(res2+res1)
                    console.log(i)
                    if (res*res1>0) {
                        i1 = i
                        res1 = res
                    } else {
                        i2 = i
                        res2 = res
                    }
                }
            }
            document.getElementById('display').value = (100*i).toFixed(2)
            document.getElementById('i').title = i
            document.getElementById('i').style.background = '#0005'
        }
        function setPV() {
            if (newVal) {
                PV = Number(document.getElementById('display').value)
                newVal = false
            } else {
// PV = (FV - PMT * ((1+i)^n-1) / i )  /  (1+i)^n
                PV = (FV + PMT * (Math.pow(1+i,n)-1)/i) / Math.pow(1+i,n)
                console.log(PV)
            }
            document.getElementById('display').value = PV.toFixed(2)
            document.getElementById('PV').title = PV
            document.getElementById('PV').style.background = '#0005'
        }
        function setPMT() {
            if (newVal) {
                PMT = Number(document.getElementById('display').value)
                newVal = false
            } else {
// PMT = (FV - PV * (1+i)^n) / (((1+i)^n-1) / i)
                PMT = (FV + PV*Math.pow(1+i,n)) / ((Math.pow(1+i,n)-1)/i)
                console.log(PMT)
            }
            document.getElementById('display').value = PMT.toFixed(2)
            document.getElementById('PMT').title = PMT
            document.getElementById('PMT').style.background = '#0005'
        }
        function setFV() {
            if (newVal) {
                FV = Number(document.getElementById('display').value)
                newVal = false
            } else {
// FV = PV * (1+i)^n  +  PMT * ((1+i)^n-1) / i
                FV = -(PV * Math.pow(1+i,n)  +  PMT * (Math.pow(1+i,n)-1)/i)
                console.log(FV)
            }
            document.getElementById('display').value = FV.toFixed(2)
            document.getElementById('FV').title = FV
            document.getElementById('FV').style.background = '#0005'
        }
        function CHS() {
            if (newVal) {
                var val = document.getElementById('display').value
                document.getElementById('display').value = -1*Number(val)
            }
        }
    </script>
</body>
</html>
