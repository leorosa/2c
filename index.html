<!DOCTYPE html>
<html lang='pt'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='description' content='2C: A minimal financial calculator.'>
    <title>Essencial HP 12c</title>
    <link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
    <style>
        #display {
            position: relative;
            left: -620px;
            top: -413px;
            background: #0000;
            text-align: right;
            font-size: 36pt;
            font-weight: bold;
/*          font-style: italic; */
            letter-spacing: 8px;
            border: none;
            outline: none;
            font-family: 'Seven Segment';
            width: 300px;
        }
        button {
            background: #0000;
            color: #0000;
            border: none;
            position: relative;
            top: -330px;
            width: 50px;
            height: 45px;
        }
        #n { left: 55px; }
        #i { left: 73px; }
        #PV { left: 91px; }
        #PMT { left: 109px; }
        #FV { left: 127px; }
        #CHS { left: 145px; }
        #clear {
            top: -240px;
            left: 340px;
        }
    </style>
</head>
<body>
    <img src='hp12c_platinum.jpg'>
    <input type='number' step='any' id='display'></input><br>
    <div id='buttons'>
        <button id='n' onclick='setVar("n")'>n</button>
        <button id='i' onclick='setVar("i")'>i</button>
        <button id='PV' onclick='setVar("PV")'>PV</button>
        <button id='PMT' onclick='setVar("PMT")'>PMT</button>
        <button id='FV' onclick='setVar("FV")'>FV</button>
        <button id='CHS' onclick='CHS()'>CHS</button>
    </div>
    <br><button id='clear' onclick='clearVals()'>clear</button>
    <script>
        var vars = { n:0, i:0, PV:0, PMT:0, FV:0 }
        var newVal = false
        document.getElementById('display').value = '0'
        document.getElementById('display').onclick = function () {
            document.getElementById('display').value = ''
            newVal = true
        }
        function clearVals() {
            newVal = false
            document.getElementById('display').value = '0'
            document.getElementById('display').style.background = '#0000'
            for (let key of Object.keys(vars)) {
                vars[key] = 0
                document.getElementById(key).title = 0
                document.getElementById(key).style.background = '#0000'
            }
        }
        function setVar(key) {
            if (newVal) {
                vars[key] = Number(document.getElementById('display').value)
                if (key=='i')
                    vars[key] /= 100
                newVal = false
            } else {
                if (key=='n') // n = log( (PMT+i*FV)/(PMT-PV) ) / log(1+i)
                    vars.n = Math.log( (vars.PMT+vars.i*vars.FV)/(vars.PMT-vars.PV) ) / Math.log(1+vars.i)
                else if (key=='i')
                    vars.i = setI()
                else if (key=='PV') // PV = (FV - PMT * ((1+i)^n-1) / i )  /  (1+i)^n
                    vars.PV = (vars.FV + vars.PMT * (Math.pow(1+vars.i,vars.n)-1)/vars.i) / Math.pow(1+vars.i,vars.n)
                else if (key=='PMT') // PMT = (FV - PV * (1+i)^n) / (((1+i)^n-1) / i)
                    vars.PMT = (vars.FV + vars.PV*Math.pow(1+vars.i,vars.n)) / ((Math.pow(1+vars.i,vars.n)-1)/vars.i)
                else if (key=='FV') // FV = PV * (1+i)^n  +  PMT * ((1+i)^n-1) / i
                    vars.FV = -(vars.PV * Math.pow(1+vars.i,vars.n)  +  vars.PMT * (Math.pow(1+vars.i,vars.n)-1)/vars.i)
                console.log(vars[key])
            }
            if (key=='i')
                document.getElementById('display').value = (100*vars.i).toFixed(2)
            else
                document.getElementById('display').value = vars[key].toFixed(2)
            document.getElementById(key).title = vars[key]
            document.getElementById(key).style.background = '#0005'
        }
        function setI() {
// Linear Iteractive Method: -> does not converge
//  i = (PMT * ((1+i)^n-1)) / (FV - PV * (1+i)^n)
// Regula Falsi Method (better than bisect)
                var i1 = 0.000001
                var i2 = 10
                vars.i = (i1+i2)/2
                res1 = vars.FV + vars.PV*Math.pow(1+i1,vars.n) + vars.PMT*(Math.pow(1+i1,vars.n)-1)/i1
                res2 = vars.FV + vars.PV*Math.pow(1+i2,vars.n) + vars.PMT*(Math.pow(1+i2,vars.n)-1)/i2
                while (Math.abs(i1-i2)>0.001) {
                    res = vars.FV + vars.PV*Math.pow(1+vars.i,vars.n) + vars.PMT*(Math.pow(1+vars.i,vars.n)-1)/vars.i
                    vars.i = (i1*res2-i2*res1)/(res2+res1)
                    console.log(100*i)
                    if (res*res1>0) {
                        i1 = vars.i
                        res1 = res
                    } else {
                        i2 = vars.i
                        res2 = res
                    }
                }
        }
    </script>
</body>
</html>
