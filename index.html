<!DOCTYPE html>
<html lang='pt'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='description' content='2C: A minimal financial calculator.'>
    <title>2C</title>
</head>
<body>
    <input type='text' id='display'></input><br>
    <div id='buttons'>
        <button id='n'>n</button>
        <button id='i'>i</button>
        <button id='PV'>PV</button>
        <button id='PMT'>PMT</button>
        <button id='FV'>FV</button>
        <button id='CHS'>CHS</button>
    </div>
    <br><button id='clear'>clear</button>
    <script>
        var newVal = false
        var n = 0
        var i = 0
        var PV = 0
        var PMT = 0
        var FV = 0
        document.getElementById('display').onclick = function () { newVal = true }
        document.getElementById('clear').onclick = function () {
            console.log(newVal)
            newVal = false
            n = 0
            i = 0
            PV = 0
            PMT = 0
            FV = 0
        }
    </script>
</body>
</html>
