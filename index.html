<!DOCTYPE html>
<html lang='pt'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='description' content='2C: A minimal financial calculator.'>
    <title>2C</title>
</head>
<body>
    <input type='text' id='display'></input><br>
    <div id='buttons'>
        <button id='n' onclick='setN()'>n</button>
        <button id='i' onclick='setI()'>i</button>
        <button id='PV' onclick='setPV()'>PV</button>
        <button id='PMT' onclick='setPMT()'>PMT</button>
        <button id='FV' onclick='setFV()'>FV</button>
        <button id='CHS' onclick='CHS()'>CHS</button>
    </div>
    <br><button id='clear' onclick='clearVals()'>clear</button>
    <script>
        var newVal = false
        var n = 0
        var i = 0
        var PV = 0
        var PMT = 0
        var FV = 0
        document.getElementById('display').onclick = function () { newVal = true }
        function clearVals() {
            console.log(newVal)
            newVal = false
            n = 0
            i = 0
            PV = 0
            PMT = 0
            FV = 0
            document.getElementById('display').value = ''
        }
        function setN() {
            if (newVal) {
                n = document.getElementById('display').value
                newVal = false
                document.getElementById('display').value = ''
            }
        }
        function setI() {
            if (newVal) {
                i = document.getElementById('display').value
                newVal = false
                document.getElementById('display').value = ''
            }
        }
        function setPV() {
            if (newVal) {
                PV = document.getElementById('display').value
                newVal = false
                document.getElementById('display').value = ''
            }
        }
        function setPMT() {
            if (newVal) {
                PMT = document.getElementById('display').value
                newVal = false
                document.getElementById('display').value = ''
            }
        }
        function setFV() {
            if (newVal) {
                FV = document.getElementById('display').value
                newVal = false
                document.getElementById('display').value = ''
            }
        }
        function CHS() {
            if (newVal) {
                var val = document.getElementById('display').value
                document.getElementById('display').value = -1*Number(val)
            }
        }
    </script>
</body>
</html>
