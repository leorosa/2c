<!DOCTYPE html>
<html lang='pt'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='description' content='2C: A minimal financial calculator.'>
    <title>2C</title>
</head>
<body>
    <input type='number' step='any' id='display'></input><br>
    <div id='buttons'>
        <button id='n' onclick='setN()'>n</button>
        <button id='i' onclick='setI()'>i</button>
        <button id='PV' onclick='setPV()'>PV</button>
        <button id='PMT' onclick='setPMT()'>PMT</button>
        <button id='FV' onclick='setFV()'>FV</button>
        <button id='CHS' onclick='CHS()'>CHS</button>
    </div>
    <br><button id='clear' onclick='clearVals()'>clear</button>
    <script>
        var newVal = false
        var n = 0
        var i = 0
        var PV = 0
        var PMT = 0
        var FV = 0
        document.getElementById('display').onclick = function () {
            document.getElementById('display').value = ''
            newVal = true
        }
        function clearVals() {
            console.log(newVal)
            newVal = false
            n = 0
            i = 0
            PV = 0
            PMT = 0
            FV = 0
            document.getElementById('display').value = ''
        }
        function setN() {
            if (newVal) {
                n = Number(document.getElementById('display').value)
                newVal = false
            } else {
// n = log( (PMT+i*FV)/(PMT-PV) ) / log(1+i)
                n = Math.log( (PMT+i*FV)/(PMT-PV) ) / Math.log(1+i)
                document.getElementById('display').value = n
                console.log(n)
            }
            document.getElementById('display').value = (n).toLocaleString(undefined)
        }
        function setI() {
            if (newVal) {
                i = Number(document.getElementById('display').value)/100
                newVal = false
            } else {
// Linear Iteractive Method:
//  i = (PMT * ((1+i)^n-1)) / (FV - PV * (1+i)^n)
                var iOld = 1
                while (Math.abs(iOld-i)>0.01) {
                    i = (PMT*(Math.pow(1+i,n)-1)) / (FV - PV*Math.pow(1+i,n))
                    console.log(i)
                }
                document.getElementById('display').value = 100*i
            }
            document.getElementById('display').value = (i).toLocaleString(undefined)
        }
        function setPV() {
            if (newVal) {
                PV = Number(document.getElementById('display').value)
                newVal = false
            } else {
// PV = (FV - PMT * ((1+i)^n-1) / i )  /  (1+i)^n
                PV = (FV - PMT * (Math.pow(1+i,n)-1)/i) / Math.pow(1+i,n)
                console.log(PV)
            }
            document.getElementById('display').value = (PV).toLocaleString(undefined)
        }
        function setPMT() {
            if (newVal) {
                PMT = Number(document.getElementById('display').value)
                newVal = false
            } else {
// PMT = (FV - PV * (1+i)^n) / (((1+i)^n-1) / i)
                PMT = (FV - PV*Math.pow(1+i,n)) / ((Math.pow(1+i,n)-1)/i)
                document.getElementById('display').value = PMT
                console.log(PMT)
            }
            document.getElementById('display').value = (PMT).toLocaleString(undefined)
        }
        function setFV() {
            if (newVal) {
                FV = Number(document.getElementById('display').value)
                newVal = false
            } else {
// FV = PV * (1+i)^n  +  PMT * ((1+i)^n-1) / i
                FV = PV * Math.pow(1+i,n)  +  PMT * (Math.pow(1+i,n)-1)/i
                document.getElementById('display').value = FV
                console.log(FV)
            }
            document.getElementById('display').value = (FV).toLocaleString(undefined)
        }
        function CHS() {
            if (newVal) {
                var val = document.getElementById('display').value
                document.getElementById('display').value = -1*Number(val)
            }
        }
    </script>
</body>
</html>
